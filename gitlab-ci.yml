image: mcr.microsoft.com/dotnet/sdk:10.0

stages:
  - restore
  - build
  - test
  - publish

restore:
  stage: restore
  script:
    - dotnet restore

build:
  stage: build
  script:
    - dotnet build --configuration Release

test:
  stage: test
  script:
    - dotnet test --verbosity normal

publish:
  stage: publish
  script:
    - dotnet publish -c Release -o publish
  artifacts:
    paths:
      - publish/